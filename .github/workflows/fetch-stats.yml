name: Fetch Subgraph Stats

on:
  # Run every day at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch stats from subgraph
        env:
          SUBGRAPH_BASE_URL: ${{ secrets.SUBGRAPH_BASE_URL }}
        run: node scripts/fetch-stats.js

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/protocol-data.json public/deposits-stats.json \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      - name: Commit and push updated JSON
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/protocol-data.json public/deposits-stats.json
          git commit -m "chore: update subgraph stats $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
