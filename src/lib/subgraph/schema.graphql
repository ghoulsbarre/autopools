###########################################################
## Custom
###########################################################

"""
Simple ERC20 representation
"""
type RefToken @entity(immutable: false) {
	# token address
	id: Bytes!
	"ERC20 Symbol"
	symbol: String
	"ERC20 Name"
	name: String
	"ERC20 Number of decimals"
	decimals: BigInt!
}

"""
Token info and stats for the protocol
"""
type Token @entity(immutable: false) {
	# token address
	id: Bytes!

	"ERC20 Symbol"
	symbol: String
	"ERC20 Name"
	name: String
	"ERC20 Number of decimals"
	decimals: BigInt!
	"Total Supply of the token"
	totalSupply: BigInt!

	"Total amount locked in the protocol"
	totalAmountLocked: BigInt!
	"Total fees collected for the token"
	feesCollected: BigInt!
	"Total rewards claimed for the token"
	rewardsClaimed: BigInt!

	"Last used daily stats history entry"
	lastDayData: TokenDayData

	"Spot Price Oracle when token is an LP token"
	spotPriceOracle: Bytes

	"Token Oracle"
	tokenOracle: Bytes
}

"""
Overall protocol stats
"""
type Protocol @entity(immutable: false) {
	id: String! # version
	"Total number of wallets providing liquidity for the protocol"
	totalSuppliers: BigInt!

	"All assets locked / used in the protocol"
	assets: [Token!]!

	"TOKE address"
	tokeAddress: Bytes!

	"Currently configured RootPriceOracle"
	rootPriceOracle: Bytes

	"Incentive tokens registered in the system"
	incentiveTokenValues: [TokenValue!]!

	"Tokens we denominate pools in"
	denominationTokenValues: [TokenValue!]!

	"Last recorded ETH/USD price"
	ethUsdPrice: BigInt!

	"Last timestamp of recorded ETH/USD price"
	ethUsdPriceTimestamp: BigInt!

	roles: [RoleInfo!]!

	autopoolRegistry: Bytes
}

type RoleInfo @entity(immutable: false) {
	"The role itself"
	id: Bytes!

	"A decoded name of the role if we have it"
	name: String

	adminRole: Bytes!

	holders: [Bytes!]!
}

"""
Daily entry for protocol history
"""
type TokenDayData @entity(immutable: false) {
	"Key of daily data entry. Format: `<tokenAddress>-<YYYY-MM-DD>`"
	id: String!
	"Token address"
	token: Token!
	"Date of data `YYYY-MM-DD`"
	date: String!
	"Total amount locked in the protocol"
	totalAmountLocked: BigInt!
	"Total fees collected for the token"
	feesCollected: BigInt!
	"Total rewards claimed for the token"
	rewardsClaimed: BigInt!

	"Token supply: first entry of the day"
	open: BigInt!
	"Token supply: high of the day"
	high: BigInt!
	"Token supply: low of the day"
	low: BigInt!
	"Token supply: last entry of the day"
	close: BigInt!

	"TS the day of the stats at 00:00"
	timestamp: BigInt!
}

"""
Staking overall stats
"""
type AccToke @entity(immutable: false) {
	"Version of Staking (one entity per version)"
	id: String! # ACCTOKE_VERSION
	"Total number of wallets staking in the protocol"
	totalStakers: BigInt!
